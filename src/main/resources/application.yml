# =====================================================
# 银行核心转账系统 - Spring Boot 配置文件
# 文档编号: BRD-TRANSFER-2026-001
# =====================================================

server:
  port: 8080

spring:
  application:
    name: bank-transfer-service

  # =====================================================
  # MySQL 8.0 数据源配置
  # =====================================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 注意：CI环境中通常使用 localhost，密码需与 GitHub Actions 配置一致
    # 【修改点】使用环境变量占位符 ${变量名:默认值}
    # 本地运行时如果没有配置环境变量，就会使用冒号后面的默认值 (localhost, root, 123456)
    # GitHub Actions 运行时会自动注入真实的 DB_HOST 和 DB_PASS
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bank_core}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: ${DB_USER:root}
    password: ${DB_PASS:518089}  # ⚠️ 这里的 123456 只是给本地开发用的假密码，不会上传真实密码
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      pool-name: BankTransferHikariPool

  # =====================================================
  # 【新增】数据库初始化配置 (解决 CI 环境空库问题)
  # =====================================================
  sql:
    init:
      mode: never             # 始终执行初始化 (开发/测试环境用 always)
      schema-locations: classpath:db/schema.sql   # 指向你的建表脚本
      data-locations: classpath:db/data.sql       # 指向你的初始数据脚本
      continue-on-error: false  # 遇到错误立即停止，方便排查
      encoding: UTF-8           # 确保中文不乱码

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # =====================================================
  # JSON 序列化配置
  # =====================================================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss.SSS
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

# =====================================================
# MyBatis 配置
# =====================================================
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.bank.core.banktransferservice.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    use-generated-keys: true
    default-executor-type: REUSE
    default-statement-timeout: 30

# =====================================================
# 日志配置
# =====================================================
logging:
  level:
    root: INFO
    com.bank.core.banktransferservice.mapper: DEBUG
    org.springframework: INFO
    org.mybatis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# =====================================================
# 测试模式配置
# =====================================================
app:
  test-mode:
    enabled: true
    default-channel: MB

# =====================================================
# 业务配置
# =====================================================
bank:
  transfer:
    channel-limits:
      MB:
        single-limit: 50000.00
        daily-limit: 99999999.00
      EB:
        single-limit: 500000.00
        daily-limit: 2000000.00
      WC:
        single-limit: 10000.00
        daily-limit: 50000.00

    fee:
      same-bank-fee: 0.00
      cross-bank-same-city:
        - max-amount: 2000.00
          fee: 2.00
        - max-amount: 5000.00
          fee: 5.00
        - max-amount: 10000.00
          fee: 5.00
        - max-amount: 50000.00
          fee: 10.00
        - max-amount: 999999999.99
          fee: 10.00
      cross-bank-different-city:
        - max-amount: 2000.00
          fee: 2.00
        - max-amount: 5000.00
          fee: 5.00
        - max-amount: 10000.00
          fee: 10.00
        - max-amount: 50000.00
          fee: 15.00
        - max-amount: 999999999.99
          fee: 15.00
      large-amount-rate: 0.0003
      large-amount-max-fee: 50.00

    vip-discount:
      star-5: 0.50
      star-7: 1.00

    route:
      hvps:
        start-time: "08:30:00"
        end-time: "17:00:00"
        work-days: [1, 2, 3, 4, 5]
      ibps-max-amount: 50000.00

    security:
      idempotency-token-expire: 86400
      nonce-expire: 300
      nonce-time-skew: 300
      face-recognition-threshold: 50000.00